<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Hunter Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Job Hunter Tracker</h1>
      <p>Tracks local job application activity in your browser.</p>
    </header>

    <section>
      <h2>Application status</h2>
      <div id="status">Checking page...</div>
    </section>

    <section>
      <h2>Recent opened job ads</h2>
      <div id="opened-history"></div>
    </section>

    <section>
      <h2>Recent submitted applications</h2>
      <div id="history"></div>
      <div class="footer-actions">
        <a href="dashboard.html" target="_blank" class="btn-dashboard">View Dashboard</a>
        <button id="clear-history">Clear submitted</button>
      </div>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
